<!DOCTYPE html>
<html lang="uz" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#1E3A5F" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Search console verification -->
    <meta name="google-site-verification" content="40sFJ8rQzQeF9cPPcnrbjAdy7DbWEWSnumDaX3v0GX0" />

    <!-- Default SEO meta — overridden at runtime by useSeoMeta + siteInfo store -->
    <title>Academicbook</title>
    <meta name="description" content="Ilmiy jurnal — ochiq kirish, peer-review." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph defaults -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Academicbook" />
    <meta property="og:title" content="Academicbook" />
    <meta property="og:description" content="Ilmiy jurnal — ochiq kirish, peer-review." />
    <meta property="og:image" content="/og-default.png" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Academicbook" />
    <meta name="twitter:description" content="Ilmiy jurnal — ochiq kirish, peer-review." />
    <meta name="twitter:image" content="/og-default.png" />

    <!-- Font preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font stylesheet -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet"
    />

    <!-- Chart.js (admin dashboard only) — loaded globally for simplicity -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  </head>
  <body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-200">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
