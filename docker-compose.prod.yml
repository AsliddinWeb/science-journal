services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  api:
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    restart: unless-stopped

  frontend:
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    # Bound to loopback only — host nginx reverse-proxies to this port.
    # Port chosen to avoid collisions with other projects on shared hosts.
    # Override with: NGINX_HOST_PORT=<port> docker compose up …
    ports:
      - "127.0.0.1:${NGINX_HOST_PORT:-18801}:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
