# Internal nginx config — only listens on container port 80,
# host nginx reverse-proxies to 127.0.0.1:${NGINX_HOST_PORT:-18801}

upstream api_upstream {
    server api:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

# Crawler detection — bots don't run JS, so we serve them a
# server-rendered HTML for article pages with embedded citation_*
# meta tags. Humans keep getting the SPA.
map $http_user_agent $is_crawler {
    default              0;
    ~*googlebot-scholar  1;
    ~*googlebot          1;
    ~*bingbot            1;
    ~*yandex             1;
    ~*duckduckbot        1;
    ~*baiduspider        1;
    ~*applebot           1;
    ~*slurp              1;
    ~*twitterbot         1;
    ~*facebookexternalhit 1;
    ~*linkedinbot        1;
    ~*telegrambot        1;
    ~*whatsapp           1;
    ~*discordbot         1;
    ~*slackbot           1;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Uploaded files (PDFs, images)
    location /api/uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Sitemap & robots
    location = /sitemap.xml {
        proxy_pass http://api_upstream/sitemap.xml;
        proxy_set_header Host $host;
    }
    location = /robots.txt {
        proxy_pass http://api_upstream/robots.txt;
        proxy_set_header Host $host;
    }

    # Prerender endpoint — exposed so it can be tested directly and
    # used by the internal bot rewrite below.
    location /prerender/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
    }

    # Article detail — bots get server-rendered HTML, humans get the SPA.
    # We use return + error_page to dispatch without the "if + proxy_pass" pitfall.
    location ~ ^/articles/(?<article_id>[-0-9a-fA-F]{8,})/?$ {
        error_page 418 = @article_bot;
        error_page 419 = @article_human;
        if ($is_crawler) { return 418; }
        return 419;
    }

    location @article_bot {
        internal;
        proxy_pass http://api_upstream/prerender/articles/$article_id;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
    }

    location @article_human {
        internal;
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Frontend (Vue SPA) — everything else
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
