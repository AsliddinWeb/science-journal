# Internal nginx config — only listens on container port 80,
# host nginx will reverse-proxy to 127.0.0.1:8088

upstream api_upstream {
    server api:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Real IP from host nginx
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Uploaded files (PDFs, images)
    location /api/uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
    }

    # Sitemap & robots
    location = /sitemap.xml {
        proxy_pass http://api_upstream/sitemap.xml;
        proxy_set_header Host $host;
    }
    location = /robots.txt {
        proxy_pass http://api_upstream/robots.txt;
        proxy_set_header Host $host;
    }

    # Frontend (Vue SPA)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
