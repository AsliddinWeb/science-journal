services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: journal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d journal_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - journal_net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - journal_net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - journal_net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - api
      - redis
    networks:
      - journal_net
    command: celery -A app.tasks.email_tasks.celery_app worker --loglevel=info -Q email,pdf

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - journal_net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - journal_net

volumes:
  postgres_data:
  redis_data:

networks:
  journal_net:
    driver: bridge
